<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.15);
  --white-90: rgba(255,255,255,0.9);
  --white-60: rgba(255,255,255,0.6);
  --white-35: rgba(255,255,255,0.35);
  --white-15: rgba(255,255,255,0.15);
  --white-08: rgba(255,255,255,0.08);
  --white-04: rgba(255,255,255,0.04);
}

html, body {
  background: #000;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Georgia, serif;
  overflow: hidden;
  height: 100vh; width: 100vw;
  color: rgba(255,255,255,0.85);
}

/* ===== 礼物交互场景 ===== */
#gb-canvas-wrapper {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle at center, #0a0a0a 0%, #000 90%);
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#gb-canvas-container { width: 100%; height: 100%; display: block; }

#gb-controls {
  position: absolute; top: 20px; right: 20px; z-index: 9999;
  display: flex; gap: 15px; transition: opacity 0.5s;
}
.gb-icon-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--white-15);
  color: var(--green); font-size: 20px;
  display: flex; justify-content: center; align-items: center;
  cursor: pointer; backdrop-filter: blur(4px); transition: 0.3s;
}
.gb-icon-btn:hover { background: var(--green-dim); box-shadow: 0 0 12px rgba(74,222,128,0.3); }

#gb-video-container {
  position: absolute; top: 80px; right: 20px; z-index: 100;
  width: 160px; height: 120px;
  border: 1px solid var(--white-15);
  border-radius: 8px; overflow: hidden;
  transform: scaleX(-1);
  box-shadow: 0 0 15px rgba(74,222,128,0.1);
  background: #000; transition: opacity 1s;
  cursor: pointer; opacity: 0; pointer-events: none;
}
#gb-video-container.active { opacity: 1; pointer-events: auto; }
#gb-video-container.minimized { width: 60px; height: 45px; opacity: 0.7; }
#gb-input-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; position: absolute; top: 0; left: 0; pointer-events: none; }
#gb-skeleton-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; pointer-events: none; }

#gb-ui-layer {
  position: absolute; top: 30px; left: 30px; z-index: 3; pointer-events: none;
  color: var(--white-90);
  transition: opacity 0.5s; display: none;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Georgia, serif;
}
#gb-ui-layer h1 {
  font-weight: 200; letter-spacing: 6px; font-size: 2rem; margin: 0 0 20px 0;
  color: var(--white-90);
}
.gb-instructions {
  font-size: 0.9rem; color: var(--white-60); max-width: 300px;
  padding: 0;
  font-weight: 300;
  position: relative; overflow: hidden;
}
.gb-highlight { color: var(--green); font-weight: 400; }
.gb-gesture-item {
  padding: 8px 0;
  transition: all 0.4s ease;
  opacity: 0.5;
  transform: scale(0.95);
}
.gb-gesture-item.active {
  opacity: 1;
  transform: scale(1.05);
  color: var(--white-90);
  text-shadow: 0 0 8px rgba(74,222,128,0.4);
}
.gb-gesture-item .gb-highlight {
  transition: color 0.3s;
}
.gb-gesture-item.active .gb-highlight {
  color: #00ff88;
  text-shadow: 0 0 12px rgba(0,255,136,0.6);
}

#gb-start-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 50; background: #000;
  transition: opacity 1.2s ease-out;
  cursor: url('cursor-cat-teaser.png') 0 0, pointer;
}
#gb-file-input { display: none; }

/* 猫咪视频场景 */
#cat-video-wrapper {
  position: relative;
  width: 40vw; max-width: 240px;
  aspect-ratio: 1/1;
  overflow: visible;
  cursor: inherit;
  transition: transform 0.3s;
}
#cat-video-wrapper:hover {
  transform: scale(1.02);
}
#cat-video-wrapper.cat-react {
  animation: catReact 0.3s ease;
}
@keyframes catReact {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
#cat-click-hint {
  position: absolute; bottom: -40px; left: 0; right: 0;
  text-align: center;
  color: var(--white-60); font-size: 0.8rem;
  opacity: 0; transition: opacity 0.5s;
}
#cat-click-hint.visible { opacity: 1; }
#cat-click-hint .hint-emoji { font-size: 1.1rem; margin-right: 4px; }
#cat-video {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}
#cat-video-hint {
  position: absolute; bottom: -36px; left: 0; right: 0;
  text-align: center;
  color: var(--white-35); font-size: 0.85rem;
  transition: opacity 0.5s;
}
#cat-video-hint .hint-action { color: var(--white-60); font-weight: 400; }

/* ===== 爱心便签弹窗 ===== */
#heart-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 200; pointer-events: none; display: none;
}
.heart-note {
  position: absolute;
  width: 150px; height: 40px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500;
  font-family: '微软雅黑', 'PingFang SC', sans-serif;
  color: #333;
  border: 1px solid rgba(0,0,0,0.1);
  box-shadow: 2px 2px 8px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.6);
  opacity: 0;
  transform: scale(0.5);
  animation: heartNoteIn 0.3s forwards;
}
.heart-note-scatter {
  position: absolute;
  width: 150px; height: 40px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500;
  font-family: '微软雅黑', 'PingFang SC', sans-serif;
  color: #333;
  border: 1px solid rgba(0,0,0,0.1);
  box-shadow: 1px 1px 6px rgba(0,0,0,0.2);
  opacity: 0;
  animation: heartNoteIn 0.15s forwards;
}
@keyframes heartNoteIn {
  to { opacity: 1; transform: scale(1); }
}
@keyframes heartNoteOut {
  to { opacity: 0; transform: scale(0.3); }
}

@media screen and (max-width: 768px) {
  #gb-ui-layer h1 { font-size: 1.5rem; letter-spacing: 4px; }
  #gb-ui-layer { top: 20px; left: 20px; width: calc(100% - 40px); }
  .gb-instructions { font-size: 0.8rem; padding: 12px; max-width: none; width: 100%; box-sizing: border-box; }
  #gb-video-container { top: auto; bottom: 20px; right: 20px; width: 100px; height: 75px; }
  #gb-start-btn { padding: 14px 40px; font-size: 1.2rem; }
  #gb-controls { top: 15px; right: 15px; }
}

const MAX_INTRO_PARTICLES = 3000;
let introPoints = null;
let fireworks = [];

// ── 粒子文字 ──
function initIntroParticles() {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(MAX_INTRO_PARTICLES * 3);
  const colors = new Float32Array(MAX_INTRO_PARTICLES * 3);
  for (let i = 0; i < MAX_INTRO_PARTICLES; i++) {
    pos[i*3]   = (Math.random()-0.5)*1000;
    pos[i*3+1] = (Math.random()-0.5)*1000;
    pos[i*3+2] = (Math.random()-0.5)*1000;
    const isCyan = Math.random() > 0.5;
    colors[i*3]   = isCyan ? 0.2 : 1.0;
    colors[i*3+1] = isCyan ? 0.8 : 1.0;
    colors[i*3+2] = 1.0;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({ size: 2.5, vertexColors: true, transparent: true, opacity: 1, blending: THREE.AdditiveBlending });
  introPoints = new THREE.Points(geo, mat);
  scene.add(introPoints);
}

function getTextParticles(text, width=600, height=300, fontSize=180) {
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,width,height);
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${fontSize}px "Microsoft YaHei", sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, width/2, height/2);
  const imgData = ctx.getImageData(0,0,width,height).data;
  const particles = [];
  const step = 3;
  for (let y=0; y<height; y+=step) {
    for (let x=0; x<width; x+=step) {
      if (imgData[(y*width+x)*4] > 128)
        particles.push(new THREE.Vector3((x-width/2)*0.8, -(y-height/2)*0.8, 0));
    }
  }
  return particles.sort(() => Math.random()-0.5);
}

function morphToText(text, fontSize=180) {
  const targetPos = getTextParticles(text, 600, 300, fontSize);
  const positions = introPoints.geometry.attributes.position.array;
  for (let i=0; i<MAX_INTRO_PARTICLES; i++) {
    const start = new THREE.Vector3(positions[i*3], positions[i*3+1], positions[i*3+2]);
    const end = i < targetPos.length
      ? targetPos[i]
      : new THREE.Vector3((Math.random()-0.5)*800, (Math.random()-0.5)*800, -500-Math.random()*500);
    new TWEEN.Tween(start).to(end, 800).easing(TWEEN.Easing.Cubic.InOut)
      .onUpdate(() => {
        positions[i*3]=start.x; positions[i*3+1]=start.y; positions[i*3+2]=start.z;
        introPoints.geometry.attributes.position.needsUpdate = true;
      }).start();
  }
}

function triggerWarpSpeed(callback) {
  const positions = introPoints.geometry.attributes.position.array;
  for (let i=0; i<MAX_INTRO_PARTICLES; i++) {
    const start = new THREE.Vector3(positions[i*3], positions[i*3+1], positions[i*3+2]);
    const end = start.clone().add(new THREE.Vector3((Math.random()-0.5)*500, (Math.random()-0.5)*500, 1500));
    new TWEEN.Tween(start).to(end, 1200).easing(TWEEN.Easing.Exponential.In)
      .onUpdate(() => {
        positions[i*3]=start.x; positions[i*3+1]=start.y; positions[i*3+2]=start.z;
        introPoints.geometry.attributes.position.needsUpdate = true;
      }).start();
  }
  setTimeout(() => { introPoints.visible = false; if(callback) callback(); }, 1200);
}

// ── 烟花 ──
function createFirework() {
  const fw = {
    pos: new THREE.Vector3((Math.random()-0.5)*200, -150, (Math.random()-0.5)*100-50),
    targetY: 40+Math.random()*120,
    color: new THREE.Color().setHSL(0.5+Math.random()*0.2, 1, 0.7),
    particles: null, exploded: false, life: 1.0
  };
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([fw.pos.x, fw.pos.y, fw.pos.z], 3));
  fw.rocket = new THREE.Points(geo, new THREE.PointsMaterial({color: fw.color, size: 7, transparent: true, blending: THREE.AdditiveBlending}));
  scene.add(fw.rocket);
  fireworks.push(fw);
}

function updateFireworks() {
  for (let i=fireworks.length-1; i>=0; i--) {
    const fw = fireworks[i];
    if (!fw.exploded) {
      fw.pos.y += 3;
      fw.rocket.geometry.attributes.position.setY(0, fw.pos.y);
      fw.rocket.geometry.attributes.position.needsUpdate = true;
      if (fw.pos.y >= fw.targetY) { fw.exploded = true; scene.remove(fw.rocket); explodeFirework(fw); }
    } else {
      fw.life -= 0.015;
      const positions = fw.particles.geometry.attributes.position.array;
      for (let j=0; j<fw.velocities.length; j++) {
        positions[j*3]   += fw.velocities[j].x;
        positions[j*3+1] += fw.velocities[j].y;
        positions[j*3+2] += fw.velocities[j].z;
        fw.velocities[j].y -= 0.03;
      }
      fw.particles.geometry.attributes.position.needsUpdate = true;
      fw.particles.material.opacity = fw.life;
      if (fw.life <= 0) { scene.remove(fw.particles); fireworks.splice(i,1); }
    }
  }
}

function explodeFirework(fw) {
  const count = 500;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count*3);
  fw.velocities = [];
  for (let i=0; i<count; i++) {
    pos[i*3]=fw.pos.x; pos[i*3+1]=fw.pos.y; pos[i*3+2]=fw.pos.z;
    fw.velocities.push(randomSpherePoint(1.0+Math.random()*5.0));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  fw.particles = new THREE.Points(geo, new THREE.PointsMaterial({color: fw.color, size: 5.5, transparent: true, blending: THREE.AdditiveBlending}));
  scene.add(fw.particles);
}

// ── 音乐 / 全屏 ──
const gbBgm = document.getElementById('gb-bgm');

window.gbToggleMusic = function() {
  if (gbBgm.paused) {
    gbBgm.play().then(() => {
      document.getElementById('gb-music-btn').style.color = '#00ff00';
      document.getElementById('gb-music-btn').style.borderColor = '#00ff00';
    }).catch(()=>{});
  } else {
    gbBgm.pause();

window.gbToggleFullscreen = function() {
  const elem = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    (elem.requestFullscreen || elem.webkitRequestFullscreen).call(elem);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
};

window.gbToggleVideoSize = function() {
  document.getElementById('gb-video-container').classList.toggle('minimized');
};

// ── 纹理 ──
function createTexture(type) {
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  const cx=64, cy=64;
  if (type === 'snow') {
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,64);
    grad.addColorStop(0, 'rgba(230,250,255,0.9)');
    grad.addColorStop(0.4, 'rgba(0,215,255,0.4)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ── 尺寸 ──
function gbUpdateDimensions() {
  const wrapper = document.getElementById('gb-canvas-wrapper');
  const w = wrapper.clientWidth || window.innerWidth;
  const h = wrapper.clientHeight || window.innerHeight;
  return { width: w, height: h };
}

// ── Three.js 初始化 ──
function gbInitThree() {
  try {
    const container = document.getElementById('gb-canvas-container');
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000510, 0.002);

    const dims = gbUpdateDimensions();
    camera = new THREE.PerspectiveCamera(50, dims.width/dims.height, 0.1, 5000);
    camera.position.set(0, 0, 350);

    renderer = new THREE.WebGLRenderer({ antialias: window.devicePixelRatio < 2, powerPreference: 'high-performance', alpha: true });
    renderer.setSize(dims.width, dims.height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    scene.add(new THREE.AmbientLight(0xaaccff, 0.4));
    const mainSpot = new THREE.SpotLight(0xeefaff, 250);
    mainSpot.position.set(50,80,50); mainSpot.penumbra=0.5; scene.add(mainSpot);
    const fillLight = new THREE.PointLight(0x0088ff, 80, 200);
    fillLight.position.set(-50,20,50); scene.add(fillLight);

    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(dims.width, dims.height), 1.5, 0.4, 0.85);
    bloomPass.threshold=0.8; bloomPass.strength=1.0; bloomPass.radius=0.8;
    composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    createMaterialsAndMeshes();
    createDust();
    createBlueSnow();
    createStarField();
    scene.add(mainGroup);
    mainGroup.visible = false;
    cakeMaterials.forEach(m => { m.opacity=1.0; m.transparent=true; });

    window.addEventListener('resize', gbOnWindowResize);
    gbAnimate();
  } catch(e) {
    console.error('Gift Three.js 初始化失败:', e);
    window.__gbInitError = e.message + ' | ' + (e.stack ? e.stack.split('\n').slice(0,3).join(' >> ') : '');
    // 清理可能的半初始化状态
    scene = null; renderer = null; camera = null; composer = null;
  }
}

// ── 开始体验 ──
let gbEarlyCameraStream = null;

// ── 爱心便签逻辑 ──
const heartTips = ['多喝水哦~','好好爱自己','好好吃饭','保持好心情','我想你了','顺顺利利','别熬夜','天冷了多穿衣服',
  '保持微笑呀','每天都要元气满满','记得吃水果','梦想成真','期待下一次见面','早点休息','愿所有烦恼都消失','今天过得开心嘛'];
const heartColors = ['lightpink','skyblue','lightgreen','lavender','lightyellow','plum','coral','bisque','aquamarine','mistyrose','honeydew'];

function genHeartPoints(n) {
  const sw = window.innerWidth, sh = window.innerHeight;
  const points = [];
  for (let i = 0; i < n; i++) {
    const t = (i / n) * 2 * Math.PI;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    const scale = Math.min(sw, sh) * 0.025;
    const px = Math.round(sw/2 + x * scale - 75);
    const py = Math.round(sh/2 - y * scale - 25);
    points.push([Math.max(0, Math.min(px, sw-150)), Math.max(0, Math.min(py, sh-50))]);
  }
  return points;
}

function playHeartAnimation() {
  const layer = document.getElementById('heart-layer');
  layer.style.display = 'block';
  layer.innerHTML = '';
  const points = genHeartPoints(100);
  let idx = 0;
  const notes = [];

  function addHeartNote() {
    if (idx >= points.length) {
      // 爱心完成，停留1秒后关闭爱心，开始铺满便签
      setTimeout(() => {
        notes.forEach(n => { n.style.animation = 'heartNoteOut 0.3s forwards'; });
        setTimeout(() => {
          layer.innerHTML = '';
          scatterNotes();
        }, 400);
      }, 1000);
      return;
    }
    const [px, py] = points[idx];
    const note = document.createElement('div');
    note.className = 'heart-note';
    note.style.left = px + 'px';
    note.style.top = py + 'px';
    note.style.backgroundColor = heartColors[Math.floor(Math.random() * heartColors.length)];
    note.textContent = heartTips[Math.floor(Math.random() * heartTips.length)];
    layer.appendChild(note);
    notes.push(note);
    idx++;
    setTimeout(addHeartNote, 30);
  }

  // 第二阶段：铺满屏幕的便签轰炸
  function scatterNotes() {
    const sw = window.innerWidth, sh = window.innerHeight;
    const total = Math.min(200, Math.floor((sw / 150) * (sh / 40)) + 50);
    let i = 0;
    function addScatter() {
      if (i >= total) {
        // 铺满完成，3秒后全部消失
        setTimeout(() => {
          layer.querySelectorAll('.heart-note-scatter').forEach(n => {
            n.style.animation = 'heartNoteOut 0.5s forwards';
          });
          setTimeout(() => {
            layer.innerHTML = '';
            layer.style.display = 'none';
          }, 600);
        }, 3000);
        return;
      }
      const note = document.createElement('div');
      note.className = 'heart-note-scatter';
      note.style.left = Math.random() * (sw - 150) + 'px';
      note.style.top = Math.random() * (sh - 40) + 'px';
      note.style.backgroundColor = heartColors[Math.floor(Math.random() * heartColors.length)];
      note.textContent = heartTips[Math.floor(Math.random() * heartTips.length)];
      layer.appendChild(note);
      i++;
      setTimeout(addScatter, 5);
    }
    addScatter();
  }

  addHeartNote();
}

// ── 猫咪视频交互（逗猫棒 3 阶段点击）──
(function initCatVideo() {
  const wrapper = document.getElementById('cat-video-wrapper');
  const video = document.getElementById('cat-video');
  const hint = document.getElementById('cat-video-hint');
  const clickHint = document.getElementById('cat-click-hint');
  const startScreen = document.getElementById('gb-start-screen');

  // 时间线（基于 12.4s 视频，逐帧校准）
  // 直接从坐姿开始（跳过入场跳跃），在关键节点暂停等待点击：
  // 开始直接定格在1.3s（坐姿）等待点击
  // 点击 → 1.3→5.0s 猫招手+舔爪子 → 暂停在5.0s（舔爪结束定格）
  // 点击 → 跳到5.8s直接打滚（跳过舔爪过渡）→ 暂停在8.5s（仰躺四脚朝天）
  // 点击 → 8.5→结束 猫起身走向镜头 → 进入体验
  const PAUSE_AT = { sit: 1.3, waveEnd: 5.0, rollStart: 5.8, rollEnd: 8.5 };

  // stage: 1=坐姿等点击, 2=播放招手中, 3=招手完等点击, 4=播放打滚中, 5=打滚完等点击, 6=播放礼物中, 7=结束
  let stage = 1; // 直接从坐姿开始
  let rafId = null;

  function showClickHint(text) {
    clickHint.innerHTML = text;
    clickHint.classList.add('visible');
  }
  function hideClickHint() {
    clickHint.classList.remove('visible');
  }

  // 用 requestAnimationFrame 精确监测视频时间，确保动作完整播完才暂停
  function startWatching() {
    function check() {
      if (video.paused) { rafId = null; return; }

      const t = video.currentTime;

      if (stage === 2 && t >= PAUSE_AT.waveEnd) {
        // 招手播完，精确停在招手最后一帧
        video.pause();
        video.currentTime = PAUSE_AT.waveEnd;
        stage = 3;
        showClickHint('🐾 再戳看更多~');
        rafId = null;
        return;
      }
      if (stage === 4 && t >= PAUSE_AT.rollEnd) {
        // 打滚播完，精确停在打滚最后一帧
        video.pause();
        video.currentTime = PAUSE_AT.rollEnd;
        stage = 5;
        showClickHint('🐾 再戳有惊喜！');
        rafId = null;
        return;
      }
      if (stage === 6 && (t >= (video.duration || 12.4) - 0.1)) {
        // 礼物播完 → 进入体验
        video.pause();
        stage = 7;
        rafId = null;
        setTimeout(() => {
          startScreen.style.opacity = '0';
          setTimeout(() => { startScreen.style.display = 'none'; }, 1200);
          window.gbStartExperience();
        }, 800);
        return;
      }

      rafId = requestAnimationFrame(check);
    }
    if (!rafId) rafId = requestAnimationFrame(check);
  }

  // 视频播放时启动精确监测
  video.addEventListener('play', startWatching);

  // 直接定格到坐姿帧，不播放入场动画
  video.addEventListener('loadeddata', function() {
    video.currentTime = PAUSE_AT.sit;
    video.pause();
    hint.style.opacity = '0';
    showClickHint('🐾 用逗猫棒戳戳它~');
  });
  // 设置初始时间
  video.load();

  // 点击处理
  function handleClick() {
    wrapper.classList.add('cat-react');
    setTimeout(() => wrapper.classList.remove('cat-react'), 300);

    if (stage === 1) {
      // 第1次点击：继续播放招手段
      stage = 2;
      video.play();
      showClickHint('🐾 猫咪在打招呼~');
    } else if (stage === 3) {
      // 第2次点击：跳过舔爪过渡，直接打滚
      stage = 4;
      video.currentTime = PAUSE_AT.rollStart;
      video.play();
      showClickHint('🐾 猫咪在打滚~');
    } else if (stage === 5) {
      // 第3次点击：继续播放礼物出现
      stage = 6;
      video.play();
      hideClickHint();
    }
  }

  wrapper.addEventListener('click', handleClick);

  // 触屏支持
  wrapper.addEventListener('touchend', (e) => {
    e.preventDefault();
    handleClick();
  }, { passive: false });
})();

function createBlueSnow() {
  const geo = new THREE.BufferGeometry();
  const pos=[], speeds=[], sizes=[];
  for (let i=0; i<CONFIG.snowCount; i++) {
    pos.push((Math.random()-0.5)*350, (Math.random()-0.5)*350, (Math.random()-0.5)*250);
    speeds.push(0.02+Math.random()*0.08);
    sizes.push(2.0+Math.random()*4.0);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('size',     new THREE.Float32BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({ color:0xddeeff, size:1.0, map:createTexture('snow'), transparent:true, opacity:0.6, blending:THREE.AdditiveBlending, depthWrite:false });
  snowSystem = new THREE.Points(geo, mat);
  snowSystem.userData = { speeds };
  scene.add(snowSystem);

function updateSnow() {
  if (!snowSystem) return;
  const positions = snowSystem.geometry.attributes.position.array;
  const speeds = snowSystem.userData.speeds;
  for (let i=0; i<CONFIG.snowCount; i++) {
    positions[i*3+1] -= speeds[i];
    positions[i*3]   += Math.sin(time*0.5+i)*0.05;
    if (positions[i*3+1] < -120) {
      positions[i*3+1]=120; positions[i*3]=(Math.random()-0.5)*350; positions[i*3+2]=(Math.random()-0.5)*250;
    }
  }
  snowSystem.geometry.attributes.position.needsUpdate = true;
  snowSystem.rotation.y = time*0.01;
}

// ── 星形几何 ──
function createStarGeometry() {
  const shape = new THREE.Shape();
  const outerR=3.5, innerR=1.6, pts=5;
  for (let i=0; i<pts*2; i++) {
    const angle=(i*Math.PI)/pts;
    const r = i%2===0 ? outerR : innerR;
    const x=Math.cos(angle)*r, y=Math.sin(angle)*r;
    if (i===0) shape.moveTo(x,y); else shape.lineTo(x,y);
  }
  shape.closePath();
  return new THREE.ExtrudeGeometry(shape, {steps:1,depth:0.8,bevelEnabled:true,bevelThickness:0.3,bevelSize:0.3,bevelSegments:3});
}

function createInstancedMesh(geo, mat, count, dataArray) {
  const mesh = new THREE.InstancedMesh(geo, mat, count);
  mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  mainGroup.add(mesh);
  for (let i=0; i<count; i++) {
    const ti = Math.floor(Math.random()*CONFIG.tiers.length);
    const tier = CONFIG.tiers[ti];
    const h = Math.random()*tier.height;
    let r = Math.sqrt(Math.random())*tier.radius;
    if (Math.random()>0.3) r = tier.radius*(0.9+Math.random()*0.15);
    const theta = Math.random()*Math.PI*2;
    const treePos = new THREE.Vector3(r*Math.cos(theta), tier.yBottom+h, r*Math.sin(theta));
    dataArray.push({ treePos, scatterPos:randomSpherePoint(40+Math.random()*40), currentPos:treePos.clone(), scale:0.6+Math.random()*0.8, rotSpeed:new THREE.Euler(Math.random()*0.03,Math.random()*0.03,Math.random()*0.03), rotation:new THREE.Euler(Math.random()*Math.PI,Math.random()*Math.PI,0), tierIndex:ti });
  }
  return mesh;
}

function randomSpherePoint(r) {
  const u=Math.random(), v=Math.random();
  const theta=2*Math.PI*u, phi=Math.acos(2*v-1);
  return new THREE.Vector3(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
}

function createDust() {
  const geo = new THREE.BufferGeometry();

    pos.push(x,y,z);
    logicData.dust.push({ treePos:new THREE.Vector3(x,y,z), scatterPos:randomSpherePoint(60), currentPos:new THREE.Vector3(x,y,z), tierIndex:ti });
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  const dustMat = new THREE.PointsMaterial({ color:0xccffff, size:0.8, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending, depthWrite:false });
  cakeMaterials.push(dustMat);
  dustSystem = new THREE.Points(geo, dustMat);

}

function gbAnimate() {
  requestAnimationFrame(gbAnimate);
  TWEEN.update();
  time += 0.01;
  frameCount++;
  if (fireworks.length > 0) updateFireworks();
  if (introPoints && introPoints.visible) {
    introPoints.material.size = 2.0 + Math.sin(time * 15) * 1.5;
  }
  if (mainGroup.visible) {
    gbUpdateInstancedMesh(goldMesh, logicData.gold);
    gbUpdateInstancedMesh(silverMesh, logicData.silver);
    gbUpdateInstancedMesh(gemMesh, logicData.gem);
    gbUpdateInstancedMesh(emeraldMesh, logicData.emerald);
    gbUpdateDust();
    gbUpdatePhotos();
    if (logicData.star) {
      let target = currentState === STATE.TREE ? logicData.star.userData.treePos : logicData.star.userData.scatterPos;
      logicData.star.position.lerp(target, 0.1);
      logicData.star.position.y += Math.sin(time * 2) * 0.03;
      logicData.star.rotation.y += 0.02;
    }
    if (textGroup) {
      textGroup.lookAt(camera.position);
      const targetOpacity = (currentState === STATE.TREE) ? 1.0 : 0.0;
      textGroup.material.opacity += (targetOpacity - textGroup.material.opacity) * 0.1;
    }
    if (currentState === STATE.ZOOM) {
      rotationVelocity.x = 0; rotationVelocity.y = 0;
    } else if (currentState === STATE.SCATTER) {
      if (isHandPresent && gbLastStableGesture === 'open') {
        // 只在张开手掌时响应滑动旋转，握拳/捧手移动不转（用于复位手位）
        const deltaX = handPos.x - lastHandPos.x;
        const deltaY = handPos.y - lastHandPos.y;
        if (Math.abs(deltaX) < 0.08 && Math.abs(deltaX) > 0.001) rotationVelocity.y += deltaX * 0.5;
        if (Math.abs(deltaY) < 0.08 && Math.abs(deltaY) > 0.001) rotationVelocity.x += deltaY * 0.15;
        lastHandPos.x = handPos.x; lastHandPos.y = handPos.y;
      } else if (isHandPresent) {
        // 非开掌状态，只更新位置不旋转（这样复位手时不会反转）
        lastHandPos.x = handPos.x; lastHandPos.y = handPos.y;
      }
      rotationVelocity.y = Math.min(Math.max(rotationVelocity.y, -0.15), 0.15);
      rotationVelocity.x = Math.min(Math.max(rotationVelocity.x, -0.08), 0.08);
      mainGroup.rotation.y += rotationVelocity.y;
      mainGroup.rotation.x += rotationVelocity.x;
      rotationVelocity.y *= 0.92;
      rotationVelocity.x *= 0.88;
      mainGroup.rotation.x *= 0.95;
    } else if (currentState === STATE.TREE) {
      mainGroup.rotation.y += 0.003;
      mainGroup.rotation.x *= 0.95;
    }
  }
  updateSnow();
  composer.render();
}

function gbUpdateInstancedMesh(mesh, dataArray) {
  const isMobile = window.innerWidth < 768;
  const lerpFactor = isMobile ? 0.25 : 0.1;
  for (let i = 0; i < dataArray.length; i++) {
    const item = dataArray[i];
    let target = currentState === STATE.TREE ? item.treePos : item.scatterPos;
    if (currentState === STATE.ZOOM) target = item.scatterPos;
    if (currentState === STATE.SCATTER) item.currentPos.y += Math.sin(time + i) * 0.005;
    item.currentPos.lerp(target, lerpFactor);
    item.rotation.x += item.rotSpeed.x; item.rotation.y += item.rotSpeed.y;
    let s = item.scale;
    if (currentState === STATE.ZOOM) s = item.scale * 0.6;
    dummy.position.copy(item.currentPos);
    dummy.rotation.copy(item.rotation);
    dummy.scale.setScalar(s);
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  mesh.instanceMatrix.needsUpdate = true;
}

function gbUpdateDust() {
  const isMobile = window.innerWidth < 768;
  const lerpFactor = isMobile ? 0.25 : 0.1;
  const positions = dustSystem.geometry.attributes.position.array;
  for (let i=0; i<logicData.dust.length; i++) {
    const item = logicData.dust[i];
    let target = currentState === STATE.TREE ? item.treePos : item.scatterPos;
    if (currentState !== STATE.TREE) {
      item.currentPos.lerp(target, lerpFactor);
    } else {
      item.currentPos.y += 0.05;
      const tier = CONFIG.tiers[item.tierIndex];
      if (item.currentPos.y > tier.yBottom + tier.height) item.currentPos.y = tier.yBottom;
      if (Math.sqrt(item.currentPos.x**2 + item.currentPos.z**2) > tier.radius * 1.3) {
        item.currentPos.x *= 0.98; item.currentPos.z *= 0.98;
      }
    }
    positions[i*3] = item.currentPos.x; positions[i*3+1] = item.currentPos.y; positions[i*3+2] = item.currentPos.z;
  }
  dustSystem.geometry.attributes.position.needsUpdate = true;
}

function gbUpdatePhotos() {
  const isMobile = window.innerWidth < 768;
  const lerpFactor = isMobile ? 0.25 : 0.1;
  photoMeshes.forEach((mesh, idx) => {
    let targetPos, targetScale = 2.0;
    if (currentState === STATE.TREE) {
      targetPos = mesh.userData.treePos;
      targetScale = 1.0;
      const worldPos = new THREE.Vector3();
      mesh.getWorldPosition(worldPos);
      mesh.lookAt(camera.position);
    } else if (currentState === STATE.SCATTER) {
      targetPos = mesh.userData.scatterPos;
      targetScale = 3.0;
      mesh.lookAt(camera.position);
    } else if (currentState === STATE.ZOOM) {
      if (idx === zoomTargetIndex) {
        const offset = new THREE.Vector3(0, 0, -20);
        offset.applyMatrix4(camera.matrixWorld);
        targetPos = mainGroup.worldToLocal(offset);
        targetScale = 2.0;
        mesh.lookAt(camera.position);
        if (mesh.material.emissive) mesh.material.emissive.setHex(0x000000);
      } else {
        targetPos = mesh.userData.scatterPos;
        targetScale = 3.0;
        mesh.lookAt(camera.position);
        if (mesh.material.emissive) mesh.material.emissive.setHex(0x222222);
      }
    }
    mesh.position.lerp(targetPos, lerpFactor);
    mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), lerpFactor);
  });
}

gbGlobalHandLandmarker = await HandLandmarker.createFromOptions(vision2, {

function gbStartCamera() {
  if (!gbGlobalVideo) { console.warn('gbStartCamera: video element not found'); return; }
  if (gbDetectionFrameId) { cancelAnimationFrame(gbDetectionFrameId); gbDetectionFrameId = null; }
  if (gbGlobalVideo.srcObject) { gbGlobalVideo.srcObject.getTracks().forEach(t => t.stop()); gbGlobalVideo.srcObject = null; }

  // 优先使用提前获取的摄像头流（解决 Safari 用户手势限制）
  if (gbEarlyCameraStream) {
    console.log('使用提前获取的摄像头流');
    gbGlobalVideo.srcObject = gbEarlyCameraStream;
    gbEarlyCameraStream = null;
    gbGlobalVideo.play().then(() => gbPredictWebcam()).catch(e => console.error('video play failed:', e));
    return;
  }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    console.error('此浏览器不支持 getUserMedia，需要 HTTPS 环境');
    return;
  }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } })
    .then(stream => {
      console.log('摄像头已成功开启');
      gbGlobalVideo.srcObject = stream;
      gbGlobalVideo.play().then(() => gbPredictWebcam());
    })
    .catch(err => {
      console.error('Camera failed:', err.name, err.message);
      if (err.name === 'NotFoundError' || err.name === 'OverconstrainedError' || err.name === 'NotAllowedError') {
        navigator.mediaDevices.getUserMedia({ video: true })
          .then(stream => { gbGlobalVideo.srcObject = stream; gbGlobalVideo.play().then(() => gbPredictWebcam()); })
          .catch(e2 => console.error('Camera fallback also failed:', e2.name, e2.message));
      }
    });
}

let gbLastPredictionTime = -1;
async function gbPredictWebcam() {
  if (!gbGlobalHandLandmarker) { gbDetectionFrameId = requestAnimationFrame(gbPredictWebcam); return; }
  if (!gbGlobalVideo || gbGlobalVideo.paused || gbGlobalVideo.ended || gbGlobalVideo.readyState < 2) {
    gbDetectionFrameId = requestAnimationFrame(gbPredictWebcam); return;
  }
  const startTimeMs = performance.now();
  if (startTimeMs - gbLastPredictionTime < 50) { gbDetectionFrameId = requestAnimationFrame(gbPredictWebcam); return; }
  gbLastPredictionTime = startTimeMs;
  try {
    const result = gbGlobalHandLandmarker.detectForVideo(gbGlobalVideo, startTimeMs);
    const canvas = document.getElementById('gb-skeleton-canvas');
    const ctx = canvas.getContext('2d');
    if (canvas.width !== gbGlobalVideo.videoWidth || canvas.height !== gbGlobalVideo.videoHeight) {
      canvas.width = gbGlobalVideo.videoWidth;
      canvas.height = gbGlobalVideo.videoHeight;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (result.landmarks && result.landmarks.length > 0) {
      const landmarks = result.landmarks[0];
      isHandPresent = true;
      gbDrawSkeleton(ctx, landmarks, canvas.width, canvas.height);
      if (result.landmarks.length >= 2) {
        gbDrawSkeleton(ctx, result.landmarks[1], canvas.width, canvas.height);
        gbDetectHeartGesture(result.landmarks[0], result.landmarks[1]);
      }
      gbHandleGesture(landmarks);
    } else {
      isHandPresent = false;
    }
  } catch(e) {
    console.warn('手势检测帧错误:', e.message);
  }
  gbDetectionFrameId = requestAnimationFrame(gbPredictWebcam);
}

function gbDrawSkeleton(ctx, landmarks, w, h) {
  ctx.lineWidth = 3; ctx.strokeStyle = '#00ffff'; ctx.fillStyle = '#0088ff';
  const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  ctx.beginPath();
  for (let i=0; i<connections.length; i++) {
    const s = landmarks[connections[i][0]], e = landmarks[connections[i][1]];
    ctx.moveTo(s.x*w, s.y*h); ctx.lineTo(e.x*w, e.y*h);
  }
  ctx.stroke();
  for (let i=0; i<landmarks.length; i++) { ctx.beginPath(); ctx.arc(landmarks[i].x*w, landmarks[i].y*h, 4, 0, 2*Math.PI); ctx.fill(); }
}

// 手势防抖
let gbGestureBuffer = [];
const GB_GESTURE_FRAMES = 4;
let gbLastGestureTime = 0;
const GB_GESTURE_COOLDOWN = 600; // 手势触发后冷却
let gbLastStableGesture = 'unknown'; // 上一个稳定手势，用于检测变化

function gbClassifyGesture(landmarks) {
  const tips  = [8, 12, 16, 20];
  const pips  = [6, 10, 14, 18];
  let folded = 0;
  for (let i = 0; i < 4; i++) {
    if (landmarks[tips[i]].y > landmarks[pips[i]].y) folded++;
  }

  // 拇指尖到食指尖的距离
  const dPinch = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
  // 拇指尖到中指尖的距离
  const dThumbMiddle = Math.hypot(landmarks[4].x - landmarks[12].x, landmarks[4].y - landmarks[12].y);
  // 手掌大小参考（手腕到中指根的距离）
  const palmSize = Math.hypot(landmarks[0].x - landmarks[9].x, landmarks[0].y - landmarks[9].y);
  const normalizedPinch = palmSize > 0.01 ? dPinch / palmSize : 1;

  // pinch 判定：拇食指距离相对手掌小 + 小于拇中指距离
  // 额外：中指/无名指/小指至少2根伸直（区分pinch和fist，握拳时全弯）
  const otherFingersExtended = 4 - folded; // 除了可能的食指弯曲外，其他伸直的手指数
  // folded 统计的是 食指(8)、中指(12)、无名指(16)、小指(20)
  // pinch时食指弯向拇指但中指无名指小指伸直，所以 folded <= 2
  const isPinch = normalizedPinch < 0.3 && (dThumbMiddle > 0.01) && (dPinch / dThumbMiddle < 0.7) && folded <= 2;

  // fist 判定：4根手指都弯曲（folded>=4 已确保和pinch互斥）
  const isFist = folded >= 4;

  // open：手指全部伸直
  const isOpen = folded <= 1 && normalizedPinch > 0.35;

  if (isPinch) return 'pinch';
  if (isFist)  return 'fist';
  if (isOpen)  return 'open';
  return 'unknown';
}

// 找到正面三张中最中间的那张照片（离相机最近的那张）
function gbGetCenterPhotoIndex() {
  if (photoMeshes.length === 0) return 0;
  scene.updateMatrixWorld(true);
  camera.updateMatrixWorld(true);

  // 相机位置
  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);

  let minDist = Infinity, bestIdx = 0;
  const worldPos = new THREE.Vector3();
  photoMeshes.forEach((mesh, idx) => {
    mesh.getWorldPosition(worldPos);
    // 找离相机最近的照片 = 正面最中间那张
    const d = camPos.distanceTo(worldPos);
    if (d < minDist) { minDist = d; bestIdx = idx; }
  });
  return bestIdx;
}

// 手势完成追踪
let gbPinchViewIndex = 0; // 备用
const gbGesturesDone = { fist: false, open: false, pinch: false };
let gbHeartTriggered = false;

// 双手比爱心检测
let gbHeartGestureFrames = 0;
const GB_HEART_FRAMES_NEEDED = 8;

function gbDetectHeartGesture(hand1, hand2) {
  // 双手比爱心：两只手的拇指尖互相靠近 + 食指尖互相靠近
  const thumb1 = hand1[4], thumb2 = hand2[4];
  const index1 = hand1[8], index2 = hand2[8];
  
  // 两个拇指尖距离
  const thumbDist = Math.hypot(thumb1.x - thumb2.x, thumb1.y - thumb2.y);
  // 两个食指尖距离
  const indexDist = Math.hypot(index1.x - index2.x, index1.y - index2.y);
  
  // 比心判定：拇指尖靠近 + 食指尖靠近（放宽阈值）
  // 或者：拇指尖和对方食指尖交叉靠近（另一种比心姿势）
  const crossDist1 = Math.hypot(thumb1.x - index2.x, thumb1.y - index2.y);
  const crossDist2 = Math.hypot(thumb2.x - index1.x, thumb2.y - index1.y);
  const isHeart = (thumbDist < 0.15 && indexDist < 0.15) || 
                  (crossDist1 < 0.1 && crossDist2 < 0.1);
  
  if (isHeart) {
    gbHeartGestureFrames++;
    if (gbHeartGestureFrames >= GB_HEART_FRAMES_NEEDED && !gbHeartTriggered) {
      gbHeartTriggered = true;
      gbHighlightGesture('heart');
      setTimeout(() => { playHeartAnimation(); }, 500);
      // 动画结束后重置，允许再次触发
      setTimeout(() => {
        gbHeartTriggered = false;
        gbHeartGestureFrames = 0;
      }, 5000);
    }
  } else {
    gbHeartGestureFrames = Math.max(0, gbHeartGestureFrames - 1);
  }
}

// 动态高亮当前手势提示
let gbCurrentHighlight = 'fist';
function gbHighlightGesture(gestureName) {
  if (gestureName === gbCurrentHighlight) return;
  gbCurrentHighlight = gestureName;
  const items = document.querySelectorAll('.gb-gesture-item');
  items.forEach(item => {
    if (item.dataset.gesture === gestureName) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });
}

function gbHandleGesture(landmarks) {
  if (!mainGroup.visible) return;

  const palmX = 1 - (landmarks[0].x + landmarks[9].x) / 2;
  const palmY = (landmarks[0].y + landmarks[9].y) / 2;
  handPos.x = handPos.x * 0.8 + palmX * 0.2;
  handPos.y = handPos.y * 0.8 + palmY * 0.2;

  const gesture = gbClassifyGesture(landmarks);
  gbGestureBuffer.push(gesture);
  if (gbGestureBuffer.length > GB_GESTURE_FRAMES) gbGestureBuffer.shift();
  // 稳定性判定：4帧中至少3帧相同
  if (gbGestureBuffer.length < GB_GESTURE_FRAMES) return;
  const count = gbGestureBuffer.filter(g => g === gesture).length;
  if (count < 3) return;

  // 照片放大状态下，张开手掌 → 关闭照片，其他手势忽略
  if (gbPhotoZoomActive) {
    if (gesture === 'open' && gbLastStableGesture !== 'open') gbClosePhotoZoom();
    gbLastStableGesture = gesture;
    return;
  }

  // 边沿触发：只有手势发生变化时才执行动作（防止重复触发）
  const gestureChanged = (gesture !== gbLastStableGesture);
  gbLastStableGesture = gesture;

  // 冷却期内不触发新动作
  const now = Date.now();
  if (now - gbLastGestureTime < GB_GESTURE_COOLDOWN) return;

  // 高亮当前手势提示
  if (gesture === 'fist') gbHighlightGesture('fist');
  else if (gesture === 'open') gbHighlightGesture('open');
  else if (gesture === 'pinch') gbHighlightGesture('pinch');

  // 只在手势变化时才触发动作
  if (!gestureChanged) return;

  if (gesture === 'pinch') {
    if (photoMeshes.length > 0 && currentState === STATE.SCATTER) {
      gbGesturesDone.pinch = true;
      gbLastGestureTime = now;
      // 触发正前方中间的照片
      const centerIdx = gbGetCenterPhotoIndex();
      const blessing = photoMeshes[centerIdx].userData.blessing;
      if (blessing) {
        gbShowPhotoZoom(blessing);
      }
    }
  } else if (gesture === 'fist') {
    if (currentState !== STATE.TREE) {
      currentState = STATE.TREE; zoomTargetIndex = -1;
      rotationVelocity.x = 0; rotationVelocity.y = 0;
      gbGesturesDone.fist = true;
      gbLastGestureTime = now;
    }
  } else if (gesture === 'open') {
    if (currentState === STATE.ZOOM) {
      currentState = STATE.SCATTER; zoomTargetIndex = -1;
    } else if (currentState === STATE.TREE) {
      currentState = STATE.SCATTER;
      lastHandPos.x = handPos.x; lastHandPos.y = handPos.y;
      gbGesturesDone.open = true;
    }
  }
}

function gbOnWindowResize() {
  const dims = gbUpdateDimensions();

  camera.aspect = dims.width / dims.height;

}

function gbAddEnvelopeMesh(blessing, idx, total) {
  // 创建照片卡片
  const cardGroup = new THREE.Group();

  // 加载头像图片作为纹理
  const texLoader = new THREE.TextureLoader();
  const photoTex = texLoader.load(blessing.photo);
  photoTex.colorSpace = THREE.SRGBColorSpace;

  // 照片主体（正方形）
  const photoGeo = new THREE.PlaneGeometry(7, 7);
  const photoMat = new THREE.MeshBasicMaterial({
    map: photoTex, side: THREE.FrontSide, transparent: true, opacity: 0.55
  });
  const photoPlane = new THREE.Mesh(photoGeo, photoMat);
  cardGroup.add(photoPlane);

  // 底部名字标签
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 30px PingFang SC, Microsoft YaHei, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(blessing.from, 128, 42);
  const labelTex = new THREE.CanvasTexture(canvas);
  const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: true, side: THREE.DoubleSide });
  const label = new THREE.Mesh(new THREE.PlaneGeometry(5, 1.2), labelMat);
  label.position.set(0, -4.5, 0.05);
  cardGroup.add(label);

  // 柔和边框光晕
  const frameMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06 });
  const frame = new THREE.Mesh(new THREE.PlaneGeometry(7.6, 7.6), frameMat);
  frame.position.z = -0.1;
  cardGroup.add(frame);

  // 定位：8张照片均匀分布在蛋糕周围一圈（单层大圆）
  const theta = (idx / total) * Math.PI * 2;
  const r = 38;
  const yPos = -5 + (idx % 2) * 10; // 交错高度，避免重叠
  const treePos = new THREE.Vector3(r * Math.cos(theta), yPos, r * Math.sin(theta));

  // 散开位置：同一水平线环绕蛋糕（加大半径避免叠影）
  const scatterTheta = (idx / total) * Math.PI * 2;
  const scatterR = 70;
  const scatterY = 0; // 同一水平线
  const scatterPos = new THREE.Vector3(scatterR * Math.cos(scatterTheta), scatterY, scatterR * Math.sin(scatterTheta));

  cardGroup.userData = {
    treePos, scatterPos,
    baseRot: new THREE.Euler(0, 0, 0),
    blessing: blessing
  };
  cardGroup.position.copy(treePos);
  cardGroup.lookAt(0, yPos, 0);
  cardGroup.rotateY(Math.PI);
  photoMeshes.push(cardGroup);
  mainGroup.add(cardGroup);
}

// ── 信封点击交互 ──
let gbRaycaster, gbMouse;

function gbOnEnvelopeClick(event) {
  if (!gbRaycaster || !renderer || !camera) return;
  const rect = renderer.domElement.getBoundingClientRect();
  gbMouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  gbMouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  gbRaycaster.setFromCamera(gbMouse, camera);

  // 检测所有照片卡片 mesh
  const allMeshes = [];
  const meshToGroup = new Map();
  photoMeshes.forEach(group => {
    group.traverse(child => {
      if (child.isMesh) {
        allMeshes.push(child);
        meshToGroup.set(child, group);
      }
    });
  });
  const intersects = gbRaycaster.intersectObjects(allMeshes);

  if (intersects.length > 0) {
    // 通过 map 直接找到对应的 group
    const hitMesh = intersects[0].object;
    const group = meshToGroup.get(hitMesh);
    if (group && group.userData.blessing) {
      gbShowBlessing(group.userData.blessing);
    }
  }
}

// 记忆回廊效果：照片从小到大放大到屏幕中央，下方渐显祝福语
let gbPhotoZoomActive = false;

function gbShowPhotoZoom(blessing) {

  const existing = document.getElementById('gb-photo-zoom');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'gb-photo-zoom';
  overlay.style.cssText = `
    position: fixed; inset: 0; z-index: 99999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0); transition: background 0.5s ease;
    pointer-events: all; cursor: pointer;
  `;
  overlay.innerHTML = `
    <style>
      @keyframes photoZoomIn {
        0% { transform: scale(0.2) rotate(-5deg); opacity: 0; }
        60% { transform: scale(1.05) rotate(1deg); opacity: 1; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes blessingFadeIn {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes photoZoomOut {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0.3); opacity: 0; }
      }
    </style>
    <div id="gb-zoom-photo" style="
      width: 65vw; max-width: 300px; height: 65vw; max-height: 300px;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(74,222,128,0.2);
      border: 2px solid rgba(255,255,255,0.15);
      animation: photoZoomIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    ">
      <img src="${blessing.photo}" style="width:100%;height:100%;object-fit:cover;" />
    </div>
    <div id="gb-zoom-from" style="
      margin-top: 20px; color: rgba(74,222,128,0.9); font-size: 13px;
      letter-spacing: 3px; opacity: 0;
      animation: blessingFadeIn 0.5s ease 0.6s forwards;
    ">来自 ${blessing.from}</div>
    <div id="gb-zoom-message" style="
      margin-top: 12px; color: rgba(255,255,255,0.9); font-size: 17px;
      line-height: 1.8; text-align: center; max-width: 320px; padding: 0 20px;
      font-family: 'PingFang SC','Microsoft YaHei',serif;
      opacity: 0; animation: blessingFadeIn 0.5s ease 0.9s forwards;
    ">${blessing.message}</div>
  `;

  document.body.appendChild(overlay);
  // 背景渐暗
  requestAnimationFrame(() => { overlay.style.background = 'rgba(0,0,0,0.85)'; });

  // 点击也可关闭
  overlay.addEventListener('click', () => { gbClosePhotoZoom(); });
}

function gbClosePhotoZoom() {
  const overlay = document.getElementById('gb-photo-zoom');
  if (!overlay) { gbPhotoZoomActive = false; return; }
  const photo = document.getElementById('gb-zoom-photo');
  if (photo) photo.style.animation = 'photoZoomOut 0.4s ease forwards';
  overlay.style.background = 'rgba(0,0,0,0)';
  overlay.style.transition = 'background 0.3s ease';
  setTimeout(() => {
    overlay.remove();
    gbPhotoZoomActive = false;
    gbLastGestureTime = Date.now();
  }, 400);
}

// 兼容旧的点击调用
function gbShowBlessing(blessing) {
  gbShowPhotoZoom(blessing);
}

// Three.js 延迟到 gbStartExperience 中初始化，避免页面加载时就占用 WebGL 资源
</script>
</body>
</html>
